model_name : "GAT_devign_Qwen2.5-Coder-0.5B"
n_seeds : 3

wandb : 
  log_wandb : False
  wandb_api_key : "None"
  project : "None"
  entity : "None"
  tags : ["Devign", "GAT", "Qwen2.5-Coder-0.5B", "training"]
  log_model : false

data_module:
  dataset: "Devign"
  root: "devign_Qwen2.5-Coder-0.5B/" 
  train_csv: "devign_Qwen2.5-Coder-0.5B/split/train_ids_split.csv"
  valid_csv: "devign_Qwen2.5-Coder-0.5B/split/validation_ids_split.csv"
  test_csv:  "devign_Qwen2.5-Coder-0.5B/split/test_ids_split.csv"
  batch_size: 24
  num_workers: 4
  pin_memory: false
  persistent_workers: true
  in_memory: true


model_params : {
    "gnn_type": "GAT",
    "gnn_depth" : 8,
    "gnn_heads": 8,
    "gnn_dim": 768,      
    "gnn_norm_type": "layer_norm",
    "gnn_activation":    "LeakyReLU",

    "node_type_key": "node_type_idx",
    "use_node_type": true,
    "pos_features_key": "positional_feats",
    "use_pos_features": true,
    "semantic_features_key" : "semantic_feats",
    "use_semantic_features": true,

    "semantic_features_dim": 896,
    "pos_features_dim": 32,
    "n_node_types": 250,

    "node_type_dim": 512,
    "fuser_dim": 512,
    "fusion_method": "concat",

    "cls_pooling_method" : "max",

    "dropout": 0.03571555406002263,    
    "weight_decay": 1.3099445927631603e-05,
    "use_class_weight" : true,
    
    "lr": 8.046965773977388e-05,
    "div_factor": 100,
    "pct_start": 0.1341340433712929,
    "anneal_strategy": "cos"
    }

trainer:
  accelerator: "gpu"
  devices: 1
  epochs: 20
  precision: "16-mixed"
  log_every_n_steps: 10
  gradient_clip_val: 3.0
  gradient_clip_algorithm: "norm"
  enable_progress_bar: true
  progress_bar_color: "green"

model :
  model_type: "GNN_Classifier"
  num_classes: 2 

early :
  early_monitor : "val_auprc"
  early_mode : "max"
  early_patience : 5

ckpt : 
  ckpt_monitor : "val_auprc"
  ckpt_mode : "max"
  ckpt_save_top_k : 1








